<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SHL Assessment Recommendation Engine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #eef2f7, #f8f9fa);
    }
    .app-card {
      border-radius: 16px;
    }
    .result-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border-radius: 12px;
    }
    .result-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
    .footer {
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

<div class="container py-5">

  <!-- Header -->
  <div class="text-center mb-4">
    <h2 class="fw-bold">SHL Assessment Recommendation Engine</h2>
    <p class="text-muted">
      Intelligent AI-powered recommendation system for SHL Individual Test Solutions
    </p>
  </div>

  <!-- Main Card -->
  <div class="card shadow-lg app-card">
    <div class="card-body p-4">

      <!-- Input Section -->
      <div class="mb-3">
        <label for="query" class="form-label fw-semibold">
          Job Description / Natural Language Query
        </label>
        <textarea id="query" class="form-control" rows="5"
          placeholder="Example: Hiring a mid-level Java developer with strong collaboration and stakeholder communication skills"></textarea>
      </div>

      <div class="row align-items-center g-3 mb-3">
        <div class="col-auto">
          <label class="form-label fw-semibold mb-0">Results (1–10)</label>
        </div>
        <div class="col-auto">
          <input id="k" type="number" class="form-control" value="5" min="1" max="10">
        </div>
        <div class="col-auto">
          <button id="submit" class="btn btn-primary px-4">
            <i class="bi bi-search"></i> Recommend
          </button>
        </div>
        <div class="col">
          <div id="loading" class="text-primary d-none">
            <div class="spinner-border spinner-border-sm me-2"></div>
            Processing...
          </div>
        </div>
      </div>

      <hr>

      <!-- Results Section -->
      <div id="results" class="mt-4"></div>

    </div>
  </div>

  <!-- Footer -->
  <div class="text-center mt-4 text-muted footer">
    SHL GenAI Assessment Engine · Demo Interface · API Endpoint: <code>/recommend</code>
  </div>

</div>

<script>
document.getElementById('submit').addEventListener('click', async () => {

  const query = document.getElementById('query').value.trim();
  const k = parseInt(document.getElementById('k').value || '5');

  if (!query) {
    alert('Please enter a job description or query.');
    return;
  }

  const loading = document.getElementById('loading');
  const resultsDiv = document.getElementById('results');

  loading.classList.remove('d-none');
  resultsDiv.innerHTML = '';

  try {
    const API_BASE = 'http://127.0.0.1:8181';

    const response = await fetch(`${API_BASE}/recommend`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, k })
    });

    if (!response.ok) throw new Error('API request failed');

    const data = await response.json();
    const recommendations = data.recommendations || [];

    if (recommendations.length === 0) {
      resultsDiv.innerHTML =
        '<div class="alert alert-warning">No recommendations found.</div>';
      return;
    }

    let html = '<div class="row g-3">';
    recommendations.forEach((rec, index) => {
      html += `
        <div class="col-md-6">
          <div class="card result-card shadow-sm p-3 h-100">
            <div class="d-flex justify-content-between align-items-start">
              <h6 class="fw-semibold mb-2">${index + 1}. ${rec.assessment_name}</h6>
              <span class="badge bg-light text-dark">Score: ${(rec.score || 0).toFixed(3)}</span>
            </div>
            <a href="${rec.url}" target="_blank" class="btn btn-outline-primary btn-sm mt-2">
              <i class="bi bi-box-arrow-up-right"></i> View Assessment
            </a>
          </div>
        </div>
      `;
    });
    html += '</div>';

    resultsDiv.innerHTML = html;

  } catch (error) {
    resultsDiv.innerHTML =
      '<div class="alert alert-danger">Error fetching recommendations. Please try again.</div>';
  } finally {
    loading.classList.add('d-none');
  }
});
</script>

</body>
</html>
