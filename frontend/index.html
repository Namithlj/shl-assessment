<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SHL Assessment Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title">SHL Assessment Recommendation</h3>
          <p class="text-muted">Enter a job description or natural language query and get recommended SHL individual assessments.</p>

          <div class="mb-3">
            <label for="query" class="form-label">Job description / Query</label>
            <textarea id="query" class="form-control" rows="5" placeholder="e.g. Hiring a Java developer with teamwork and communication skills"></textarea>
          </div>
          <div class="d-flex gap-2 mb-3">
            <input id="k" type="number" class="form-control w-auto" value="5" min="1" max="10">
            <button id="submit" class="btn btn-primary">Recommend</button>
            <div id="status" class="ms-3 text-muted"></div>
          </div>

          <div id="results" class="mt-4"></div>
        </div>
      </div>
      <footer class="mt-4 text-muted small">Local demo · API: <code>/recommend</code></footer>
    </div>

    <script>
      document.getElementById('submit').addEventListener('click', async () => {
        const q = document.getElementById('query').value;
        const k = parseInt(document.getElementById('k').value || '5');
        if (!q.trim()) { alert('Please enter a query'); return; }
        document.getElementById('status').textContent = 'Loading...';
        try {
          const res = await fetch('/recommend', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: q, k }) });
          if (!res.ok) throw new Error('Request failed');
          const body = await res.json();
          const list = body.recommendations || [];
          const container = document.getElementById('results');
          if (list.length === 0) {
            container.innerHTML = '<div class="alert alert-warning">No recommendations found.</div>';
          } else {
            let html = '<table class="table"><thead><tr><th>#</th><th>Assessment</th><th>URL</th><th>Score</th></tr></thead><tbody>';
            list.forEach((r,i)=>{
              html += `<tr><td>${i+1}</td><td>${r.assessment_name}</td><td><a href="${r.url}" target="_blank">Open</a></td><td>${(r.score||0).toFixed(3)}</td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
          }
        } catch (e) {
          document.getElementById('results').innerHTML = '<div class="alert alert-danger">Error fetching recommendations.</div>';
        } finally {
          document.getElementById('status').textContent = '';
        }
      });
    </script>
  </body>
</html>
