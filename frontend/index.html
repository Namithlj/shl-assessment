<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SHL Assessment Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .result-card { transition: box-shadow .15s ease-in-out; }
      .result-card:hover { box-shadow: 0 6px 18px rgba(0,0,0,.08); }
      .small-meta { font-size: .85rem; color: #6c757d; }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
      <div class="container">
        <span class="navbar-brand mb-0 h1">SHL Assessment Recommender</span>
      </div>
    </nav>
    <div class="container mb-5">
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">Describe the role or paste a job description</h5>
              <textarea id="query" class="form-control mb-3" rows="8" placeholder="e.g. Hiring a Java developer with teamwork and communication skills"></textarea>

              <div class="d-flex gap-2 align-items-center">
                <label for="k" class="form-label mb-0">Results</label>
                <select id="k" class="form-select w-auto ms-2">
                  <option value="3">3</option>
                  <option value="5" selected>5</option>
                  <option value="7">7</option>
                  <option value="10">10</option>
                </select>
                <button id="submit" class="btn btn-primary ms-auto">Recommend</button>
              </div>

              <div id="status" class="mt-3 text-muted"></div>
              <hr>
              <p class="small text-muted">Tip: press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to submit.</p>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div id="results" class="row g-3"></div>
        </div>
      </div>
      <footer class="mt-4 text-muted small">Local demo · API: <code>/recommend</code></footer>
    </div>

    <script>
      // Use relative path when served from same Flask app; override with API_BASE if needed
      const API_BASE = window.API_BASE || '';

      function createCard(item, rank) {
        const div = document.createElement('div');
        div.className = 'col-12';
        div.innerHTML = `
          <div class="card result-card">
            <div class="card-body d-flex gap-3 align-items-start">
              <div style="width:48px; text-align:center;"><h4 class="mb-0">${rank}</h4></div>
              <div class="flex-grow-1">
                <h5 class="card-title mb-1">${item.assessment_name || 'Untitled'}</h5>
                <div class="small-meta mb-2">${item.category || ''} ${item.duration ? '· ' + item.duration : ''}</div>
                <p class="mb-1">${item.description || ''}</p>
                <div class="d-flex justify-content-between align-items-center">
                  <a class="btn btn-sm btn-outline-primary" href="${item.url}" target="_blank">Open Assessment</a>
                  <div class="text-muted">Score: <strong>${(item.score||0).toFixed(3)}</strong></div>
                </div>
              </div>
            </div>
          </div>`;
        return div;
      }

      async function runQuery() {
        const q = document.getElementById('query').value;
        const k = parseInt(document.getElementById('k').value || '5');
        if (!q.trim()) { alert('Please enter a query'); return; }
        document.getElementById('status').textContent = 'Loading...';
        const resultsEl = document.getElementById('results');
        resultsEl.innerHTML = '';
        try {
          const res = await fetch(`${API_BASE}/recommend`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: q, k })
          });
          if (!res.ok) {
            const t = await res.text();
            throw new Error(t || 'Request failed');
          }
          const body = await res.json();
          const list = body.recommendations || [];
          if (list.length === 0) {
            resultsEl.innerHTML = '<div class="col-12"><div class="alert alert-warning">No recommendations found.</div></div>';
            return;
          }
          list.forEach((r,i)=>{
            const card = createCard(r, i+1);
            resultsEl.appendChild(card);
          });
        } catch (e) {
          resultsEl.innerHTML = `<div class="col-12"><div class="alert alert-danger">Error: ${String(e).slice(0,200)}</div></div>`;
        } finally {
          document.getElementById('status').textContent = '';
        }
      }

      document.getElementById('submit').addEventListener('click', runQuery);
      document.getElementById('query').addEventListener('keydown', (ev)=>{ if (ev.ctrlKey && ev.key === 'Enter') runQuery(); });
    </script>
  </body>
</html>
