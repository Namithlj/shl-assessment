services:
  - type: web
    name: shl-assessment
    env: python
    plan: free
    # use a minimal requirements file for the runtime to avoid installing
    # heavy ML packages (torch/sentence-transformers) on low-memory hosts
    buildCommand: pip install -r requirements.prod.txt
    # bind to Render's assigned port so health checks pass reliably
    startCommand: gunicorn api.server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: HF_TOKEN
        # Set this value in the Render dashboard Secrets/Environment
        value: ""
    healthCheckPath: /
